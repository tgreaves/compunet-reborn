# Linker configuration for Compunet ROM code ($8000+)
# No fixed size limit — make_prg.py handles the final layout

MEMORY {
    ROM: start = $8000, size = $2800, type = ro, fill = yes, fillval = $00;
}

SEGMENTS {
    HEADER:   load = ROM, type = ro, start = $8000;
    CODE:     load = ROM, type = ro;
}
