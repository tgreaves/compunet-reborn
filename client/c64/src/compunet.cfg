# Linker configuration for Compunet Reborn — combined PRG
# Two memory areas linked into separate output files, then combined
# Usage: LOAD "COMPUNET",8,1 then SYS 33120 (=$8160 = COLD_START)

MEMORY {
    ROM:  start = $8000, size = $2000, type = rw, fill = yes, fillval = $FF;
    TERM: start = $9FF0, size = $1E13, type = rw, fill = yes, fillval = $00;
}

SEGMENTS {
    HEADER:   load = ROM, type = ro, start = $8000;
    CODE:     load = ROM, type = ro;
    TERMINAL: load = TERM, type = ro, start = $9FF0;
}
