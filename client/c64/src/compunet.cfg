# Linker configuration for Compunet client with LINKING support
# Produces two binaries:
#   1. Main client (ROM + ACIA) — loaded/run by user
#   2. Terminal binary — downloaded from server during LINKING

MEMORY {
    # Main client: ROM code ($8000) through to end of ACIA ($CFFF)
    # Gap between CODE end and ACIA start is filled (needed for PRG load)
    MAIN: start = $8000, size = $5000, type = rw, fill = yes, fillval = $00, file = %O;
    # Terminal: separate binary for server-side LINKING download
    TERM: start = $A000, size = $3000, type = rw, fill = no, file = "build/terminal.bin";
}

SEGMENTS {
    HEADER:   load = MAIN, type = ro, start = $8000;
    CODE:     load = MAIN, type = ro;
    ACIA:     load = MAIN, type = ro, start = $C900;
    TERMINAL: load = TERM, type = ro, start = $A000;
}
