# Linker configuration for combined Compunet PRG
# ROM at $8000 (no fill — terminal overlaps at $9FF0)

MEMORY {
    MAIN: start = $8000, size = $4000, type = rw, fill = no;
}

SEGMENTS {
    HEADER:   load = MAIN, type = ro, start = $8000;
    CODE:     load = MAIN, type = ro;
    TERMINAL: load = MAIN, type = ro, start = $9FF0;
}
