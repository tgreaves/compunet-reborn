<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compunet Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal">
        <canvas id="screen" width="384" height="264"></canvas>
    </div>
    <div id="info">
        <p>Compunet Terminal Emulator &mdash; Use &larr; &rarr; to scroll duckshoot, ENTER to select</p>
        <p><label>Load SEQ file: <input type="file" id="seq-file"></label>
           <button id="seq-prev">&larr; Prev</button>
           <span id="seq-info"></span>
           <button id="seq-next">Next &rarr;</button></p>
    </div>
    <script src="charrom.js"></script>
    <script src="help_data.js"></script>
    <script src="petscii.js"></script>
    <script src="seq_renderer.js"></script>
    <script src="protocol.js"></script>
    <script src="duckshoot.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
