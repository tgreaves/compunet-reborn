services:
  compunet-server:
    container_name: compunet-server
    build: ./server
    ports:
      - "6400:6400"
      - "6502:6502"
    expose:
      - "6403"
    volumes:
      - ./server/cfg:/app/cfg
      - ./server/data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  compunet-web:
    container_name: compunet-web
    build: ./website
    ports:
      - "6464:6464"
    volumes:
      - ./.env:/app/.env:ro
    environment:
      - COMPUNET_API_URL=http://compunet-server:6403
    depends_on:
      - compunet-server
    restart: unless-stopped
