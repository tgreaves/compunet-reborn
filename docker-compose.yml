services:
  compunet-server:
    container_name: compunet-server
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "6400:6400"
      - "6401:6401"
      - "6403:6403"
      - "6502:6502"
    volumes:
      - ./server/cfg:/app/cfg
      - ./server/data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - TZ=Europe/London
    restart: unless-stopped

  compunet-web:
    container_name: compunet-web
    build:
      context: .
      dockerfile: website/Dockerfile
    ports:
      - "6464:6464"
    volumes:
      - ./website/templates:/app/templates
      - ./website/static:/app/static
      - ./website/app.py:/app/app.py:ro
      - ./server/data:/app/server/data:ro
      - ./.env:/app/.env:ro
    environment:
      - COMPUNET_API_URL=http://compunet-server:6403
      - TZ=Europe/London
    depends_on:
      - compunet-server
    restart: unless-stopped
