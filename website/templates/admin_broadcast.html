{% extends "base.html" %}
{% block title %}Broadcast — Admin — Compunet Reborn{% endblock %}
{% block content %}
<h1>SEND BROADCAST</h1>

<form method="post">
    <div class="form-group">
        <label for="subject">SUBJECT</label>
        <input type="text" id="subject" name="subject" value="{{ subject or '' }}">
    </div>

    <div class="form-group">
        <label for="html_body">BODY (HTML)</label>
        <textarea id="html_body" name="html_body" rows="15" style="width:100%;max-width:600px;font-family:var(--font-pixel);font-size:10px;padding:10px;border:2px solid var(--c64-blue);">{{ html_body or '' }}</textarea>
    </div>

    <div class="form-group">
        <label>SEND TO</label>
        <select name="test_mode" style="font-family:var(--font-pixel);font-size:10px;padding:8px;border:2px solid var(--c64-blue);">
            <option value="test">ADMINS ONLY (TEST)</option>
            <option value="all">ALL SUBSCRIBERS</option>
        </select>
        <p class="hint">Test sends to admin accounts only. All Subscribers sends to everyone.</p>
    </div>

    <button type="submit">SEND BROADCAST</button>
</form>

<p style="margin-top: 24px;"><a href="{{ url_for('admin_users') }}">&lt; BACK TO ADMIN</a></p>
{% endblock %}
