{% extends "base.html" %}
{% block title %}Change Password — Compunet Reborn{% endblock %}
{% block content %}
<h1>CHANGE PASSWORD</h1>

<form method="POST">
    <div class="form-group">
        <label for="new_password">NEW PASSWORD</label>
        <input type="password" id="new_password" name="new_password" maxlength="6" required>
        <p class="hint">1-6 characters. Letters A-Z and numbers 0-9 only.</p>
    </div>

    <div class="form-group">
        <label for="confirm_password">CONFIRM PASSWORD</label>
        <input type="password" id="confirm_password" name="confirm_password" maxlength="6" required>
    </div>

    <button type="submit">CHANGE PASSWORD</button>
</form>
{% endblock %}
