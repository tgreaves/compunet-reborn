{% extends "base.html" %}
{% block title %}Reset Password — Compunet Reborn{% endblock %}
{% block content %}
<h1>RESET PASSWORD</h1>

<p>Enter a new password for <strong>{{ user_id }}</strong>.</p>

<form method="POST">
    <div class="form-group">
        <label for="password">NEW PASSWORD</label>
        <input type="text" id="password" name="password" required>
        <p class="hint">1-6 characters, A-Z and 0-9 only</p>
    </div>

    <div class="form-group">
        <label for="confirm_password">CONFIRM PASSWORD</label>
        <input type="text" id="confirm_password" name="confirm_password" required>
    </div>

    <button type="submit">RESET PASSWORD</button>
</form>
{% endblock %}
